# Pipeline Stages
stages:
  - build
  - test
  - security
  - deploy

# Global Variables
variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  COMPOSE_PROJECT_NAME: docker-cicd-lab

# Docker-in-Docker service for building images
services:
  - docker:24-dind

# Registry Login (executed before every job)
before_script:
  - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  - apk add --no-cache docker-compose bash curl

# --- 1. BUILD STAGE ---
build_and_tag:
  stage: build
  image: docker:24
  script:
    - echo "Building Docker image with advanced tagging..."
    - chmod +x scripts/tag-image.sh
    # Build the latest image
    - docker build -t $IMAGE_NAME:latest .
    # Execute the tagging script for multiple tags (SHA, Semantic, Branch)
    - ./scripts/tag-image.sh $IMAGE_NAME $CI_COMMIT_SHORT_SHA $CI_COMMIT_REF_NAME $CI_PIPELINE_ID
    # Versioning logic for main branch
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        git config --global user.email "ci@gitlab.com"
        git config --global user.name "GitLab CI"
        git add VERSION
        git commit -m "Bump version [skip ci]" || echo "No version changes"
        git push https://gitlab-ci-token:${CI_PUSH_TOKEN}@gitlab.com/$CI_PROJECT_PATH.git HEAD:$CI_COMMIT_REF_NAME || echo "Push failed"
      fi
  artifacts:
    paths:
      - VERSION
    expire_in: 1 week
  only:
    - main
    - develop
    - /^release\/.*$/

# --- 2. TEST STAGE ---
test_application:
  stage: test
  image: docker:24
  script:
    - echo "Testing with docker-compose..."
    - export APP_VERSION=$(cat VERSION)
    - docker-compose -f docker-compose.yml up -d app mongo redis
    - sleep 30
    - docker-compose exec -T app npm test
    - docker-compose exec -T app curl -f http://localhost:3000/health || exit 1
    - docker-compose down -v
  dependencies:
    - build_and_tag

# --- 3. SECURITY STAGE ---
security_comprehensive_scan:
  stage: security
  image: docker:24
  script:
    - echo "Installing Trivy for security scanning..."
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    # Scan App Image
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table $IMAGE_NAME:$IMAGE_TAG
    - trivy image --exit-code 1 --severity CRITICAL --format json --output app-scan-results.json $IMAGE_NAME:$IMAGE_TAG || echo "Critical vulnerabilities found!"
    # Scan Dockerfile
    - trivy config --exit-code 0 .
  artifacts:
    paths:
      - app-scan-results.json
    reports:
      container_scanning: app-scan-results.json
  allow_failure: true
  dependencies:
    - build_and_tag

# --- 4. DEPLOY STAGE (STAGING) ---
deploy_staging:
  stage: deploy
  image: docker:24
  script:
    - echo "Deploying to Staging..."
    - export APP_VERSION=$(cat VERSION)
    - docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d
    - sleep 45
    - docker-compose exec -T app curl -f http://localhost:3000/health || exit 1
    - |
      if [ ! -z "$NOTIFICATION_WEBHOOK" ]; then
        curl -X POST -H 'Content-type: application/json' --data '{"text":"🚀 Staging deploy success: v'$(cat VERSION)'"}' $NOTIFICATION_WEBHOOK
      fi
  environment:
    name: staging
    url: http://staging.example.com:3001
  when: manual
  only:
    - main

# --- 5. DEPLOY STAGE (PRODUCTION) ---
deploy_production:
  stage: deploy
  image: docker:24
  script:
    - echo "Deploying to Production..."
    - export APP_VERSION=$(cat VERSION)
    - docker-compose -f docker-compose.yml -f docker-compose.production.yml up -d
    - sleep 60
    - docker-compose exec -T app curl -f http://localhost:3000/health || exit 1
    - |
      if [ ! -z "$NOTIFICATION_WEBHOOK" ]; then
        curl -X POST -H 'Content-type: application/json' --data '{"text":"🎉 Production deploy success: v'$(cat VERSION)'"}' $NOTIFICATION_WEBHOOK
      fi
  environment:
    name: production
    url: http://production.example.com
  when: manual
  only:
    - main
  dependencies:
    - deploy_staging
